#   0.20 = 痕量类别 (>0 但 <0.01%)      17 类  (剔除 truck/car/minibike/traffic light)
#   0.05 = 缺席类别 / 用户排除          107 类

dataset: ADE20K
num_classes: 150
default_weight: 0.05

